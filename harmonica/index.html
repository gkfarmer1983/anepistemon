<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonica</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            text-align: center;
            padding: 80px 20px;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
            color: #111;
        }
        h1 {
            font-size: 3.2em;
            margin-bottom: 70px;
            letter-spacing: 0.05em;
            font-weight: normal;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }
        a {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 1.5em;
            text-decoration: none;
            color: #111;
            transition: opacity 0.2s;
        }
        a:hover {
            opacity: 0.7;
        }
        a img {
            height: 36px;
            width: auto;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.4em; }
            a { font-size: 1.25em; }
            a img { height: 28px; }
        }
    </style>
</head>
<body>

    <h1>HARMONICA</h1>

    <div class="links">
        <a href="notation/">
            <img src="icon_notation.png" alt="Notation icon">
            Triangular Harmonica Notation
        </a>

        <a href="origin/">
            <img src="icon_reed.png" alt="Reed icon">
            On the Harmonica's Origin
        </a>
    </div>

</body>
</html>
