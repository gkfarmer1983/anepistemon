<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anepistemon Press</title>
    <style>
        body {
            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            background-color: #f8f5f0;
            color: #2c2c2c;
            text-align: center;
            line-height: 1.6;
        }
        .hero {
            max-width: 900px;
            margin: 4rem auto;
            padding: 0 20px;
        }
        h1 {
            font-size: 5.2rem;
            margin: 0 0 1rem 0;
            letter-spacing: 5px;
            font-weight: bold;
        }
        .tagline {
            font-style: italic;
            font-size: 1.55rem;
            margin: 0 0 3rem 0;
            letter-spacing: 1.5px;
        }
        .wanderer {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 4rem;
        }
        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            h1 { font-size: 3.6rem; letter-spacing: 3px; }
            .tagline { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>ANEPISTEMON</h1>
        <p class="tagline">Exploring the limits of human knowledge.</p>
        <img src="wanderer.jpg" alt="Wanderer above the Sea of Fog" class="wanderer">
    </div>
    
    <main>
        <p><em>Site under construction — more coming soon.</em></p>
    </main>
</body>
</html>
