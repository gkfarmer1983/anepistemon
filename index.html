<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anepistemon Press</title>
    <style>
        body {
            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            background-color: #f8f5f0;
            color: #2c2c2c;
            text-align: center;
            line-height: 1.7;
        }
        header {
            background-color: #1a1a1a;
            color: #f8f5f0;
            padding: 5rem 1rem 3.5rem;
        }
        h1 {
            font-size: 4.8rem;
            margin: 0 0 1rem 0;
            letter-spacing: 4px;
            font-weight: bold;
        }
        .tagline {
            font-style: italic;
            font-size: 1.45rem;
            margin: 0;
            opacity: 0.95;
            letter-spacing: 1.5px;
        }
        main {
            max-width: 760px;
            margin: 4rem auto;
            padding: 0 20px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header {
                padding: 3.5rem 1rem 2.5rem;
            }
            h1 {
                font-size: 3.2rem;
                letter-spacing: 2px;
            }
            .tagline {
                font-size: 1.2rem;
                letter-spacing: 1px;
            }
            main {
                margin: 2.5rem auto;
                padding: 0 18px;
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>ANEPISTEMON</h1>
        <p class="tagline">Exploring the limits of human knowledge.</p>
    </header>
    
    <main>
        <h2>Welcome</h2>
        <p>Independent publishing and writing from the hills of Kentucky by G.K. Farmer.</p>
        <p>Site under construction — books, essays, and more coming soon.</p>
    </main>
</body>
</html>
