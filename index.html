<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anepistemon Press</title>
    <style>
        body {
            font-family: Georgia, serif;
            margin: 0;
            padding: 0;
            background-color: #f8f5f0;
            color: #2c2c2c;
            text-align: center;
            line-height: 1.6;
        }
        header {
            background-color: #1a1a1a;
            color: #f8f5f0;
            padding: 5rem 1rem 3rem;
        }
        h1 {
            font-size: 3.8rem;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
        }
        .tagline {
            font-style: italic;
            font-size: 1.35rem;
            opacity: 0.9;
        }
        main {
            max-width: 720px;
            margin: 4rem auto;
            padding: 0 20px;
        }
        .qr {
            margin: 3rem 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>ANEPIS TEMON</h1>
        <p class="tagline">G.K. Farmer • Anepistemon Press</p>
    </header>
    
    <main>
        <h2>Welcome, Seeker</h2>
        <p>Independent publishing from the hills of Kentucky.</p>
        <p>Books, essays, and thoughts on knowledge, ignorance, and everything in between.</p>
        
        <div class="qr">
            <img src="https://raw.githubusercontent.com/gkfarmer1983/anepistemon/main/qr.png" 
                 alt="QR Code" width="280"><br><br>
            <small>Scan to visit anepistemon.com</small>
        </div>
        
        <p>Site under construction — more coming soon.</p>
    </main>
</body>
</html>
